# ─── Project Antigravity Configuration ─────────────────────────────────────
# Edit this file to customize data sources, filters, and business logic.

# CSV Data Sources
# Each entry: path (relative to project root), institution, account, loader
data_sources:
  - path: "NavyFed/checking/NFCU_Checking_6mo.csv.csv"
    institution: "Navy Federal"
    account: "Checking"
    loader: "nfcu"
  - path: "NavyFed/checking/transactions-NFCU-0459-MRTG-CHK.csv"
    institution: "Navy Federal"
    account: "Mortgage Checking"
    loader: "nfcu"
  - path: "NavyFed/loans-credit/NFCU_AUTO-LOAN_6mo.csv"
    institution: "Navy Federal"
    account: "Auto Loan"
    loader: "nfcu"
  - path: "NavyFed/loans-credit/NFCU_CC_6mo.csv"
    institution: "Navy Federal"
    account: "Credit Card"
    loader: "nfcu"
  - path: "Chase/Checking/Chase8973_Activity_Checking.CSV"
    institution: "Chase"
    account: "Checking"
    loader: "chase"
  - path: "Chase/Loans-Credit/Chase8115_Activity_CC.CSV"
    institution: "Chase"
    account: "Credit Card"
    loader: "chase"

# Categories excluded from Income/Expense calculations (internal moves)
excluded_categories:
  - "Transfers"
  - "Savings"
  - "Credit Card Payments"

# Officiating income detection pattern (regex, case-insensitive)
officiating_pattern: "Deposit.*(?:High|Middle|Jr|Creek|Greene|Spencer|Christi|Board|Terre|Clarksvill|Greensburg|Community|Brown County|Tri-north|Franklin|James|Eastern)"

# Subscription / recurring charge keywords
subscription_keywords:
  - "Acorns Grow"
  - "Netflix"
  - "Youtube"
  - "Espn"
  - "Google Cloud"
  - "Sophia Learning"
  - "Audible"
  - "Peacock"
  - "Disney"
  - "Samsung"
  - "The Week Junior"
  - "Walmart Plus"
  - "T-Mobile"
  - "Affirm"

# Chase transaction keyword → category mapping
chase_keyword_map:
  DFAS: "Retirement Income"
  AFFIRM: "Loans"
  ZELLE: "Transfers"
  NFCU: "Transfers"
  BAMBULAB: "Hobbies/Lab"
  "DAVE & BUSTER": "Entertainment"
  "CREDIT CRD": "Credit Card Payments"
  DEPOSIT: "Deposits"
  STRIPE: "Deposits"
  "PAYMENT - THANK": "Credit Card Payments"

# UI Color Palette
colors:
  dark_bg: "#0f1117"
  card_bg: "#1a1d29"
  accent: "#6C63FF"
  accent2: "#00D9A6"
  accent3: "#FF6B6B"
  text: "#e0e0e0"
  subtext: "#888"

# Server Settings
server:
  port: 8050
  debug: true
